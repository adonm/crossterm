name: publish crossterm-zuko

on:
  push:
    tags:
      - 'crossterm-zuko-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing compatibility tag to publish'
        required: true

permissions:
  contents: read

concurrency:
  group: publish-crossterm-zuko-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: publish immutable compatibility crate
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.sha }}
          fetch-depth: 0

      - name: Validate tag, package, and immutable commit
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [[ ! "$TAG" =~ ^crossterm-zuko-v([0-9]+\.[0-9]+\.[0-9]+-zuko\.[0-9]+)$ ]]; then
            echo "Compatibility tag must match crossterm-zuko-vX.Y.Z-zuko.N: $TAG" >&2
            exit 1
          fi
          version="${BASH_REMATCH[1]}"
          package=$(cargo metadata --no-deps --format-version 1 |
            python3 -c 'import json,sys; print(json.load(sys.stdin)["packages"][0]["name"])')
          manifest_version=$(cargo metadata --no-deps --format-version 1 |
            python3 -c 'import json,sys; print(json.load(sys.stdin)["packages"][0]["version"])')
          [ "$package" = crossterm-zuko ]
          [ "$manifest_version" = "$version" ]
          tag_sha=$(git rev-list -n 1 "$TAG")
          head_sha=$(git rev-parse HEAD)
          [ -n "$tag_sha" ] && [ "$tag_sha" = "$head_sha" ]
          if [ "$EVENT_NAME" = push ]; then
            [ "$EVENT_SHA" = "$head_sha" ]
          fi

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.96.1 --profile minimal
          rustup default 1.96.1

      - name: Verify package
        run: cargo publish --dry-run --locked

      - name: Check immutable version status
        id: version
        run: |
          set -euo pipefail
          version=$(cargo metadata --no-deps --format-version 1 |
            python3 -c 'import json,sys; print(json.load(sys.stdin)["packages"][0]["version"])')
          if curl --fail --silent --show-error \
            "https://crates.io/api/v1/crates/crossterm-zuko/$version" >/dev/null; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate to crates.io with trusted publishing
        id: crates-io-auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5

      - name: Publish immutable crate version
        if: steps.version.outputs.published != 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}
        run: cargo publish --locked
